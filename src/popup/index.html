<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cross Post to X</title>
    <style>
      :root {
        --bg: #15202b;
        --surface: #192734;
        --border: #38444d;
        --text: #e1e8ed;
        --text-muted: #8899a6;
        --accent: #1da1f2;
        --accent-hover: #1a91da;
        --danger: #e0245e;
        --success: #17bf63;
        --warning: #ffad1f;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        width: 100%;
        min-height: 100vh;
        overflow-y: auto;
      }

      #root {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
